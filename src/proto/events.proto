// ===========================================================================
// Платформа электронного документооборота и согласования
// Внутренние интерфейсы — асинхронная очередь сообщений
// Protocol Buffers v3
// ===========================================================================

syntax = "proto3";

package edms.events;

option java_package = "com.edms.events";
option go_package = "edms/events";

import "google/protobuf/timestamp.proto";


// ===========================================================================
// Общая структура конверта сообщения
// ===========================================================================

// Конверт, оборачивающий любое событие в очереди.
// Обеспечивает единообразную маршрутизацию, трассировку и идемпотентность.
//
// Гарантия доставки: «как минимум одна доставка».
// Все обработчики должны быть идемпотентными —
// повторная обработка события с тем же event_id
// не должна создавать побочных эффектов.

message EventEnvelope {

  // Уникальный идентификатор события (для идемпотентности).
  // Формат: строка в формате универсального уникального идентификатора версии 4.
  string event_id = 1;

  // Тип события — определяет, какое поле в oneof payload заполнено.
  string event_type = 2;

  // Идентификатор корреляции — связывает цепочку событий
  // по одному документу или бизнес-процессу.
  string correlation_id = 3;

  // Временная метка создания события.
  google.protobuf.Timestamp timestamp = 4;

  // Имя сервиса-источника, сформировавшего событие.
  string source = 5;

  // Тело события — конкретный тип определяется полем event_type.
  oneof payload {
    TaskCreatedEvent       task_created       = 10;
    DocumentSignedEvent    document_signed    = 11;
    ExternalUnavailableEvent external_unavailable = 12;
    ExternalRestoredEvent    external_restored    = 13;
  }
}


// ===========================================================================
// Контракт 4. Событие «Задача создана»
// Тема очереди: workflow.task.created
// Источник: Сервис маршрутизации
// Получатели: Сервис уведомлений
// ===========================================================================

// Публикуется при формировании новой задачи для участника маршрута.
// Сервис уведомлений отправляет уведомление назначенному пользователю
// по доступным каналам.
//
// Реакция Сервиса уведомлений:
//   - Push-уведомление: всегда (если доступен).
//   - Электронная почта: всегда.
//   - Короткое текстовое сообщение: только при priority = PRIORITY_URGENT.
//
// При недоступности шлюза уведомлений — повторные попытки
// с нарастающей задержкой (5 секунд, 30 секунд, 2 минуты, 10 минут).
// После 5 неудачных попыток — переключение на альтернативный канал.

message TaskCreatedEvent {

  // Идентификатор созданной задачи.
  string task_id = 1;

  // Идентификатор карточки документа, к которому относится задача.
  string document_id = 2;

  // Тип документа.
  DocumentType document_type = 3;

  // Предмет документа (для отображения в тексте уведомления).
  // Максимум 500 символов.
  string document_subject = 4;

  // Полное имя Инициатора документа.
  string initiator_name = 5;

  // Идентификатор пользователя, которому назначена задача.
  string assignee_id = 6;

  // Роль назначенного пользователя.
  AssigneeRole assignee_role = 7;

  // Крайний срок выполнения задачи.
  google.protobuf.Timestamp deadline = 8;

  // Тип шага маршрута.
  StepType step_type = 9;

  // Приоритет задачи.
  TaskPriority priority = 10;
}


// ===========================================================================
// Контракт 5. Событие «Документ подписан»
// Тема очереди: signature.document.signed
// Источник: Сервис электронной подписи
// Получатели: Сервис маршрутизации,
//             Сервис электронного документооборота,
//             Журнал аудита,
//             Сервис уведомлений
// ===========================================================================

// Публикуется после успешного наложения электронной подписи на документ.
//
// Реакция подписчиков:
//
//   Сервис маршрутизации (всегда):
//     Обновить статус задачи, определить следующий шаг маршрута.
//
//   Сервис электронного документооборота
//   (при all_internal_signatures_collected = true
//    и document_type = DOCUMENT_TYPE_CONTRACT):
//     Поставить документ в очередь на отправку контрагенту.
//
//   Журнал аудита (всегда):
//     Записать событие подписания с полными атрибутами.
//
//   Сервис уведомлений
//   (при all_internal_signatures_collected = true):
//     Уведомить Инициатора: «Документ подписан всеми внутренними участниками».
//
// Ошибка обработки:
//   Если file_checksum не совпадает с сохранённой контрольной суммой —
//   событие отклоняется, запись в журнал аудита
//   «Несовпадение контрольной суммы», оповещение ответственного
//   за информационную безопасность.

message DocumentSignedEvent {

  // Идентификатор карточки документа.
  string document_id = 1;

  // Уникальный идентификатор подписи.
  string signature_id = 2;

  // Идентификатор пользователя, подписавшего документ.
  string signer_id = 3;

  // Роль подписанта.
  AssigneeRole signer_role = 4;

  // Тип наложенной подписи.
  SignatureType signature_type = 5;

  // Контрольная сумма подписанного файла
  // (алгоритм хеширования семейства Безопасный Алгоритм Хеширования
  //  с длиной 256 бит).
  // Используется для верификации целостности.
  string file_checksum = 6;

  // Серийный номер сертификата.
  // Заполняется только при signature_type = SIGNATURE_TYPE_QUALIFIED.
  string certificate_serial = 7;

  // Штамп времени от криптопровайдера.
  // Заполняется только при signature_type = SIGNATURE_TYPE_QUALIFIED.
  google.protobuf.Timestamp crypto_timestamp = 8;

  // Номер подписанной версии файла.
  int32 version_number = 9;

  // Признак того, что все внутренние подписи по маршруту собраны.
  // При true — документ готов к отправке контрагенту
  // (если тип документа предполагает внешний обмен).
  bool all_internal_signatures_collected = 10;

  // Тип документа (для определения необходимости отправки контрагенту).
  DocumentType document_type = 11;
}


// ===========================================================================
// Контракт 6a. Событие «Внешняя система недоступна»
// Тема очереди: system.external.unavailable
// Источник: Любой сервис, обнаруживший недоступность
// Получатели: Сервис маршрутизации,
//             Журнал аудита,
//             Сервис уведомлений,
//             Панель мониторинга
// ===========================================================================

// Публикуется при обнаружении недоступности внешней системы.
//
// Реакция подписчиков:
//
//   Сервис маршрутизации:
//     Переключить затронутые операции в режим деградации.
//
//   Журнал аудита:
//     Записать: «Внешняя система [название] недоступна,
//     активирован режим [описание]».
//
//   Сервис уведомлений:
//     Оповестить Администратора о недоступности.
//
//   Панель мониторинга:
//     Обновить статус внешней системы на «Недоступна».

message ExternalUnavailableEvent {

  // Идентификатор внешней системы, которая стала недоступна.
  ExternalSystem external_system = 1;

  // Способ обнаружения недоступности.
  DetectionMethod detection_method = 2;

  // Временная метка последнего успешного взаимодействия с внешней системой.
  google.protobuf.Timestamp last_successful_contact = 3;

  // Список операций, затронутых недоступностью.
  repeated AffectedOperation affected_operations = 4;

  // Признак того, что резервный режим активирован автоматически.
  bool fallback_activated = 5;

  // Описание активированного резервного режима.
  // Заполняется при fallback_activated = true.
  string fallback_description = 6;
}


// ===========================================================================
// Контракт 6b. Событие «Внешняя система восстановлена»
// Тема очереди: system.external.restored
// Источник: Любой сервис, обнаруживший восстановление
// Получатели: Сервис маршрутизации,
//             Журнал аудита,
//             Сервис уведомлений,
//             Панель мониторинга
// ===========================================================================

// Публикуется при восстановлении ранее недоступной внешней системы.
//
// Реакция подписчиков:
//
//   Сервис маршрутизации:
//     Восстановить штатный режим, обработать очередь ожидания.
//
//   Журнал аудита:
//     Записать: «Внешняя система [название] восстановлена,
//     простой [длительность], в очереди [количество] операций».
//
//   Сервис уведомлений:
//     Оповестить Администратора о восстановлении.
//
//   Панель мониторинга:
//     Обновить статус на «Доступна».
//
// Примечание: если событие restored получено без предшествующего
// unavailable — обрабатывается штатно (возможна потеря события
// unavailable, что не критично).

message ExternalRestoredEvent {

  // Идентификатор восстановленной внешней системы.
  ExternalSystem external_system = 1;

  // Продолжительность недоступности в секундах.
  int64 downtime_duration_seconds = 2;

  // Количество операций в очереди, ожидавших восстановления.
  int32 pending_operations_count = 3;

  // Признак того, что автоматическая синхронизация запущена.
  bool sync_started = 4;
}


// ===========================================================================
// Перечисления
// ===========================================================================

// Тип документа.
enum DocumentType {
  DOCUMENT_TYPE_UNSPECIFIED     = 0;  // Не указан (ошибка)
  DOCUMENT_TYPE_CONTRACT        = 1;  // Договор
  DOCUMENT_TYPE_MEMO            = 2;  // Служебная записка
  DOCUMENT_TYPE_PAYMENT_REQUEST = 3;  // Заявка на оплату
  DOCUMENT_TYPE_POLICY          = 4;  // Политика / Положение
}

// Роль участника маршрута.
enum AssigneeRole {
  ASSIGNEE_ROLE_UNSPECIFIED  = 0;  // Не указана (ошибка)
  ASSIGNEE_ROLE_LAWYER       = 1;  // Юрист
  ASSIGNEE_ROLE_APPROVER     = 2;  // Согласующий (руководитель)
  ASSIGNEE_ROLE_ACCOUNTANT   = 3;  // Бухгалтер
  ASSIGNEE_ROLE_CFO          = 4;  // Финансовый директор
  ASSIGNEE_ROLE_HR_DIRECTOR  = 5;  // Директор по персоналу
  ASSIGNEE_ROLE_TECH_DIRECTOR = 6; // Технический директор
}

// Тип шага маршрута.
enum StepType {
  STEP_TYPE_UNSPECIFIED   = 0;  // Не указан (ошибка)
  STEP_TYPE_SEQUENTIAL    = 1;  // Последовательный (один участник за другим)
  STEP_TYPE_PARALLEL_VOTE = 2;  // Параллельный (одновременное голосование)
}

// Приоритет задачи.
enum TaskPriority {
  PRIORITY_UNSPECIFIED = 0;  // Не указан (ошибка)
  PRIORITY_NORMAL      = 1;  // Обычный
  PRIORITY_URGENT      = 2;  // Срочный (дополнительно отправляется
                             //   короткое текстовое сообщение)
}

// Тип электронной подписи.
enum SignatureType {
  SIGNATURE_TYPE_UNSPECIFIED          = 0;  // Не указан (ошибка)
  SIGNATURE_TYPE_QUALIFIED            = 1;  // Квалифицированная Электронная Подпись
  SIGNATURE_TYPE_ENHANCED_UNQUALIFIED = 2;  // Усиленная Неквалифицированная
                                            //   Электронная Подпись
}

// Идентификатор внешней системы.
enum ExternalSystem {
  EXTERNAL_SYSTEM_UNSPECIFIED          = 0;  // Не указана (ошибка)
  EXTERNAL_SYSTEM_LDAP                 = 1;  // Корпоративная служба каталогов
  EXTERNAL_SYSTEM_HR                   = 2;  // Система управления персоналом
  EXTERNAL_SYSTEM_ERP                  = 3;  // Система управления ресурсами
                                             //   предприятия
  EXTERNAL_SYSTEM_CRYPTO_PROVIDER      = 4;  // Криптопровайдер
  EXTERNAL_SYSTEM_EDO_OPERATOR         = 5;  // Оператор электронного
                                             //   документооборота
  EXTERNAL_SYSTEM_NOTIFICATION_GATEWAY = 6;  // Шлюз уведомлений
  EXTERNAL_SYSTEM_ARCHIVE              = 7;  // Долговременный архив
}

// Способ обнаружения недоступности внешней системы.
enum DetectionMethod {
  DETECTION_METHOD_UNSPECIFIED      = 0;  // Не указан (ошибка)
  DETECTION_METHOD_HEALTH_CHECK     = 1;  // Плановая проверка доступности
  DETECTION_METHOD_REQUEST_TIMEOUT  = 2;  // Превышение времени ожидания
                                          //   ответа при запросе
  DETECTION_METHOD_CONNECTION_REFUSED = 3; // Отказ в соединении
  DETECTION_METHOD_ERROR_RESPONSE    = 4;  // Ответ с ошибкой от внешней системы
}

// Операция, затронутая недоступностью внешней системы.
enum AffectedOperation {
  AFFECTED_OPERATION_UNSPECIFIED        = 0;   // Не указана (ошибка)
  AFFECTED_OPERATION_AUTHENTICATION     = 1;   // Аутентификация пользователей
  AFFECTED_OPERATION_BUDGET_CHECK       = 2;   // Проверка бюджетных лимитов
  AFFECTED_OPERATION_SIGNING            = 3;   // Подписание документов
  AFFECTED_OPERATION_SENDING_TO_COUNTERPARTY = 4; // Отправка контрагенту
  AFFECTED_OPERATION_NOTIFICATION_DELIVERY   = 5; // Доставка уведомлений
  AFFECTED_OPERATION_ORGSTRUCTURE_SYNC       = 6; // Синхронизация
                                                   //   организационной структуры
  AFFECTED_OPERATION_ARCHIVING               = 7; // Передача в архив
}
